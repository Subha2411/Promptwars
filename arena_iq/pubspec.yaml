name: arena_iq
description: ArenaIQ — Smart Venue Experience Assistant for sporting events.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Backend — Firebase
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Icons
  iconsax_flutter: ^1.0.0

  # Local Storage
  shared_preferences: ^2.3.2

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
